name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit + sqlmock integration tests
        run: go test ./... -count=1 -tags=integration -v

      - name: Example functions
        run: go test -run=Example -count=1 -v

      - name: Coverage
        run: go test -count=1 -tags=integration -coverprofile=coverage.out ./...
